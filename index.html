<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#A71B1B">
<title>Massimo Admin</title>
<link rel="manifest" id="manifest">
<!-- Switched from cdnjs to jsDelivr: cdnjs was intermittently returning 503 for this exact file,
     which silently broke Sign-in (msal never loaded, so "Sign in" did nothing) with no visible
     error until the login() error handling was added. jsDelivr verified reliable at time of fix. -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* Brand tokens from Massimo Italian Bread brandkit (colors_and_type.css). Display="Bradley Hand" (web: Caveat),
   Body="Book Antiqua" (web: Cormorant Garamond). System fonts are tried first since they render closer to the real brandkit. */
:root{--brown:#A71B1B;--brand:#A71B1B;--brand-dk:#7F1414;--cream:#FFFDFD;--bg:#FAF5F0;--card:#fff;--ink:#141313;--muted:#8b7f78;--green:#2e7d32;--greenbg:#e6f4e6;--orange:#e65100;--orangebg:#fff3e0;--red:#A71B1B;--line:#eee2da;
--font-display:'Bradley Hand','Caveat','Segoe Script',cursive;--font-body:'Book Antiqua','Palatino Linotype','Cormorant Garamond',Georgia,serif}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-body)}
body{background:var(--bg);color:var(--ink);padding-bottom:86px}
header{background:linear-gradient(135deg,#141313 0%,#2a1414 60%,#3d1010 100%);color:#FFFDFD;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--brand);box-shadow:0 2px 12px rgba(20,19,19,.25)}
header .hbrand{display:flex;align-items:center;gap:12px}
header .logochip{background:var(--cream);border-radius:12px;padding:5px 8px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
header img.logo{height:38px;width:auto;display:block}
header h1{font-size:22px;font-weight:600;font-family:var(--font-display);letter-spacing:.3px}
header .sub{font-size:11px;opacity:.75;font-style:italic}
header .userchip{font-size:11px;opacity:.85;cursor:pointer;text-decoration:underline}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(20,19,19,.06)}
.card h2{font-size:18px;color:var(--brand);margin-bottom:10px;font-family:var(--font-display);font-weight:600;letter-spacing:.3px;border-bottom:2px solid var(--line);padding-bottom:6px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.kpi{background:linear-gradient(180deg,#FFF9F5,#FBF1EA);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi .v{font-size:20px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.kpi .t{font-size:11px;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{color:var(--muted);text-align:left;font-weight:600;padding:5px 6px;border-bottom:1px solid var(--line);font-size:11px}
td{padding:5px 6px;border-bottom:1px solid var(--line)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
nav{position:fixed;bottom:10px;left:10px;right:10px;background:rgba(20,19,19,.92);backdrop-filter:blur(8px);border-radius:20px;display:flex;z-index:20;padding:6px;box-shadow:0 6px 24px rgba(20,19,19,.35);overflow-x:auto}
nav button{flex:1 0 auto;min-width:58px;background:none;border:none;padding:7px 4px 8px;font-size:9.5px;color:#cbbdb6;cursor:pointer;border-radius:14px;transition:all .2s;font-family:var(--font-body);white-space:nowrap}
nav button .ic{display:block;margin:0 auto 3px;width:20px;height:20px}
nav button .ic svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:#fff;background:var(--brand);font-weight:700;box-shadow:0 2px 8px rgba(167,27,27,.45)}
.btn{background:var(--brand);color:#fff;border:none;border-radius:99px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:'Lora',serif;font-weight:600;box-shadow:0 2px 6px rgba(167,27,27,.3);transition:background .2s}
.btn:hover{background:var(--brand-dk)}
.btn.sec{background:#fff;color:var(--brand);border:1.5px solid var(--brand);box-shadow:none}
.btn:disabled{opacity:.5}
.btn.sm{padding:6px 10px;font-size:12px}
input,select{border:1px solid var(--line);border-radius:8px;padding:9px;font-size:14px;width:100%;background:#fff}
input.cell{width:56px;padding:5px;text-align:right;font-size:13px}
input.cell.dirty{border-color:var(--orange);background:var(--orangebg)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill.paid{background:var(--greenbg);color:var(--green)}
.pill.pend{background:var(--orangebg);color:var(--orange)}
.pill.un{background:#eee;color:var(--muted)}
.day-head{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;background:linear-gradient(90deg,#FBF1EA,#FFF9F5);border-left:4px solid var(--brand);border-radius:10px;cursor:pointer;margin-top:8px;font-weight:700;font-size:14px}
.muted{color:var(--muted);font-size:12px}
.err{background:#fdecea;color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px;white-space:pre-wrap}
.ok{background:var(--greenbg);color:var(--green);padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px}
#loader{position:fixed;inset:0;background:rgba(250,245,240,.88);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50;font-size:14px;color:var(--brown)}
.spin{width:36px;height:36px;border:4px solid var(--line);border-top-color:var(--brown);border-radius:50%;animation:s 1s linear infinite;margin-bottom:10px}
@keyframes s{to{transform:rotate(360deg)}}
label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
.inv-cell{cursor:pointer;border-radius:6px;padding:4px 6px}
.inv-cell.paid{background:var(--greenbg)}
.inv-cell.pend{background:var(--orangebg)}
h3.wk{font-size:13px;margin:12px 0 4px;color:var(--brown)}
.filelink{display:block;padding:11px 8px;border-bottom:1px solid var(--line);color:var(--ink);text-decoration:none;font-size:14px}
.filelink small{color:var(--muted);display:block;font-size:11px}
.tot{font-weight:700;background:var(--cream)}
.locked{background:#f2f2f2!important;color:var(--muted)!important;cursor:not-allowed}
.review{background:var(--orangebg);border:1px solid var(--orange);border-radius:12px;padding:10px 12px;margin-top:10px;font-size:13px}
.review table{font-size:12px}
.pinpad{max-width:340px;margin:0 auto}
.userlist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.userbtn{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;cursor:pointer;font-family:var(--font-body);font-size:15px;min-width:100px}
.userbtn .role{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
@media(min-width:700px){nav{max-width:640px;left:50%;right:auto;transform:translateX(-50%)}}
</style>
</head>
<body>
<header><div class="hbrand"><div class="logochip"><img class="logo" id="logoimg" alt="Massimo Italian Bread"></div><div><h1 id="title">Massimo Italian Bread</h1><div class="sub" id="subtitle">Salty Water administration</div><div class="userchip" id="userchip" style="display:none" onclick="switchUser()"></div></div></div><button class="btn sm sec" id="syncBtn" onclick="fullSync()" style="display:none;background:transparent;color:#FFFDFD;border-color:#FFFDFD">⟳ Sync</button></header>
<div id="loader"><div class="spin"></div><div id="loadmsg">Loading…</div></div>
<main id="main"></main>
<nav id="nav" style="display:none">
<button data-p="home" onclick="go('home')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg></span>Overview</button>
<button data-p="deliv" onclick="go('deliv')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M1 7h14v10H1z"/><path d="M15 10h4l3 3v4h-7"/><circle cx="5.5" cy="17.5" r="1.8"/><circle cx="18.5" cy="17.5" r="1.8"/></svg></span>Deliveries</button>
<button data-p="invoices" onclick="go('invoices')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 2h12v20l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>Invoices</button>
<button data-p="income" onclick="go('income')"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.5 1.3-2.2 3-2.2s3 .9 3 2.1c0 2.8-6 1.3-6 4.1 0 1.3 1.3 2.2 3 2.2s3-.7 3-2.2"/></svg></span>Income</button>
<button data-p="exp" onclick="go('exp')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h11"/></svg></span>Expenses</button>
<button data-p="staff" onclick="go('staff')"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c.7-3.6 3.4-5.5 6.5-5.5s5.8 1.9 6.5 5.5"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.7c2.7.2 4.9 1.9 5.5 5.3"/></svg></span>Schedule</button>
<button data-p="cal" onclick="go('cal')"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg></span>Calendar</button>
<button data-p="set" onclick="go('set')"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h0a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h0a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v0a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg></span>Settings</button>
</nav>

const ROLES = {
  admin:  {label:'Admin',  canWrite:true,  canManageUsers:true},
  editor: {label:'Editor', canWrite:true,  canManageUsers:false},
  viewer: {label:'Viewer', canWrite:false, canManageUsers:false}
};
function getUsers(){ try{ return JSON.parse(localStorage.getItem('mib_users')||'[]'); }catch(e){ return []; } }
function setUsers(u){ localStorage.setItem('mib_users', JSON.stringify(u)); }
let currentUser = null; // {name, role} for this browser tab session
function can(action){ // action: 'write' | 'manageUsers'
  if(!currentUser) return false;
  const r = ROLES[currentUser.role] || ROLES.viewer;
  return action==='manageUsers' ? r.canManageUsers : r.canWrite;
}

function initMsal(){
  if(!S.clientId) return false;
  msalApp = new msal.PublicClientApplication({
    auth:{clientId:S.clientId, authority:'https://login.microsoftonline.com/common', redirectUri: location.origin+location.pathname},
    cache:{cacheLocation:'localStorage'}
  });
  return true;
}
async function login(){
  // Fixed: this used to fail completely silently (no visible error) if msalApp wasn't ready or
  // the redirect was rejected for any reason — Gu clicked Sign in and nothing happened, with no
  // way for either of us to tell why. Now any failure shows on screen with the real message.
  try{
    if(!msalApp) throw new Error('Sign-in is not ready yet — the Client ID may not be saved on this exact web address yet. Save it in Settings, then try again.');
    await msalApp.loginRedirect({scopes:['Files.ReadWrite','User.Read']});
  }catch(e){
    M.innerHTML=`<div class="err">Sign-in could not start: ${esc(e.message||e)}<br><br>Redirect URI this page is using:<br>${esc(location.origin+location.pathname)}<br><br>Check this exact address (including the trailing slash or /index.html) matches the Redirect URI in your Azure app registration.</div><button class="btn" onclick="render()">Back</button>`;
  }
}
async function getToken(){
  const req={scopes:['Files.ReadWrite','User.Read'],account};
  try{ const r=await msalApp.acquireTokenSilent(req); return r.accessToken; }
  catch(e){ await msalApp.acquireTokenRedirect(req); }
}
async function g(path, opts={}){
  const t=await getToken();
  const r=await fetch(GRAPH+path,{...opts,headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){ const b=await r.text(); throw new Error('Graph '+r.status+' on '+path.slice(0,80)+': '+b.slice(0,200)); }
  return r.status===204?null:r.json();
}
async function gbatch(reqs){ // reqs: [{id,method,url,body?}] max 20 per call
  const t=await getToken(); const out={};
  for(let i=0;i<reqs.length;i+=20){
    const chunk=reqs.slice(i,i+20).map(r=>({id:r.id,method:r.method,url:r.url,body:r.body,headers:r.body?{'Content-Type':'application/json'}:undefined}));
    const r=await fetch(GRAPH+'/$batch',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({requests:chunk})});
    const j=await r.json();
    for(const resp of j.responses) out[resp.id]=resp;
  }
  return out;
}

/* ================= HELPERS ================= */
function excelDate(v){ // Graph returns excel serials for dates
  if(typeof v==='number' && v>40000 && v<60000) return new Date(Math.round((v-25569)*86400*1000));
  return null;
}
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function monday(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function trendHtml(cur,prev,inverse){ // inverse: down is good (returns, expenses)
  if(prev==null||prev===0||cur==null) return '<span class="t flat">—</span>';
  const ch=100*(cur-prev)/Math.abs(prev); if(Math.abs(ch)<0.5) return '<span class="t flat">≈ same</span>';
  const up=ch>0, good=inverse?!up:up;
  return `<span class="t ${good?'up':'down'}">${up?'▲':'▼'} ${Math.abs(ch).toFixed(0)}% vs prev</span>`;
}
function show(msg){ document.getElementById('loader').style.display='flex'; document.getElementById('loadmsg').textContent=msg; }
function hide(){ document.getElementById('loader').style.display='none'; }
function esc(s){ return String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

/* ================= DATA LOADING ================= */
async function loadDateIndex(force){
  if(cache.dateIndex && !force) return cache.dateIndex;
  show('Reading 2026 sheet index…');
  const r=await g(wsRange('2026','A1:A26500')+'?$select=values');
  const idx=[]; // {row(1-based), date}
  r.values.forEach((v,i)=>{ const d=excelDate(v[0]); if(d) idx.push({row:i+1,d}); });
  cache.dateIndex=idx; return idx;
}
function rowsForRange(idx,from,to){ // inclusive dates -> {r1,r2} 1-based, contiguous assumption
  const f=from.getTime(), t=to.getTime()+86399999; // include whole end day
  const hit=idx.filter(x=>x.d.getTime()>=f && x.d.getTime()<=t);
  if(!hit.length) return null;
  return {r1:hit[0].row, r2:hit[hit.length-1].row};
}
async function loadBlock(r1,r2){
  const r=await g(wsRange('2026',`A${r1}:K${r2}`)+'?$select=values');
  return r.values.map((v,i)=>({row:r1+i,date:excelDate(v[0]),day:v[1],ctype:v[2],name:v[3],type:v[4],product:v[5],plan:v[6],ret:v[7],sold:v[8],price:v[9],total:v[10]}));
}
async function loadExpenditure(force){
  if(cache.exp && !force) return cache.exp;
  show('Reading expenditure…');
  const r=await g(wsRange('2026 Expenditure','A1:J1500')+'?$select=values');
  const out=[];
  r.values.slice(1).forEach(v=>{
    let d=excelDate(v[0]);
    if(!d && typeof v[0]==='string'){ const p=Date.parse(v[0]); if(!isNaN(p)) d=new Date(p); }
    if(d && v[6]!=null) out.push({d,cat:v[1]||'Other',total:Number(v[6])||0});
  });
  cache.exp=out; return out;
}
async function loadInvoiceRows(force){
  if(cache.invRows && !force) return cache.invRows;
  show('Reading invoices & income…');
  const r=await g(wsRange('Invoices & Income','A1:P130')+'?$select=values');
  const weeks=[]; // {label, headRow, totRow, cols:[{c(0-based col idx),name,amount}]}
  const V=r.values;
  for(let i=0;i<V.length;i++){
    const wk=V[i][1];
    if(typeof wk==='string' && /\d{4}|\bJan|\bFeb|\bMar|\bApr|\bMay|\bJun|\bJul|\bAug|\bSep|\bOct|\bNov|\bDec|-/.test(wk) && wk!=='WEEK' && V[i+1] && V[i+1][1]==='TOTAL TSH'){
      const cols=[];
      for(let c=2;c<=13;c++){ const name=V[0][c]; const amount=V[i+1][c]; if(name && name!=='TOTAL' && name!=='Returned') cols.push({c,name,inv:V[i][c],amount:Number(amount)||0}); }
      weeks.push({label:wk,headRow:i+1,totRow:i+2,cols,total:Number(V[i+1][12])||0});
    }
  }
  cache.invRows=weeks; return weeks;
}
function colLetter(c0){ return String.fromCharCode(65+c0); } // cols 0..13 -> A..N
// Fix (Gu, 2026-07-06): used to always slice its own "last N weeks" internally (tied to the dropdown
// that's now removed). Caller now decides exactly which weeks to fetch fills for.
async function loadInvoiceFills(weeks,force){
  const reqs=[];
  weeks.forEach(w=>w.cols.forEach(col=>{
    const key=`${w.totRow}_${col.c}`;
    if(force || !(key in cache.invFills))
      reqs.push({id:key,method:'GET',url:`/me/drive/items/${S.fileId}/workbook/worksheets('${encodeURIComponent('Invoices & Income')}')/range(address='${colLetter(col.c)}${w.totRow}')/format/fill`});
  }));
  if(reqs.length){ show(`Reading payment marks (${reqs.length} cells)…`);
    const res=await gbatch(reqs);
    for(const k in res){ cache.invFills[k]=(res[k].status===200)?(res[k].body.color||null):null; }
  }
  return cache.invFills;
}
function classifyFill(hex){
  if(!hex||hex==='#FFFFFF'||hex.toLowerCase()==='none') return 'un';
  const r=parseInt(hex.slice(1,3),16),g_=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(g_>140 && r<170 && b<170) return 'paid';
  if(r>200 && g_>90 && b<130) return 'pend';
  return 'un';
}

/* ================= AGGREGATIONS ================= */
function aggregate(rows){
  const a={plan:0,ret:0,sold:0,sales:0,byPC:{},byClient:{}};
  rows.forEach(x=>{
    const p=Number(x.plan)||0, rt=Number(x.ret)||0, sl=Number(x.sold)||0, tt=Number(x.total)||0;
    a.plan+=p; a.ret+=rt; a.sold+=sl; a.sales+=tt;
    const k=x.name+'|'+x.product;
    (a.byPC[k]=a.byPC[k]||{client:x.name,product:x.product,plan:0,ret:0,sold:0,sales:0});
    a.byPC[k].plan+=p; a.byPC[k].ret+=rt; a.byPC[k].sold+=sl; a.byPC[k].sales+=tt;
    (a.byClient[x.name]=a.byClient[x.name]||{name:x.name,plan:0,ret:0,sold:0,sales:0});
    const c=a.byClient[x.name]; c.plan+=p; c.ret+=rt; c.sold+=sl; c.sales+=tt;
  });
  return a;
}
function expByCat(exp,from,to){
  const out={}; let tot=0;
  const tEnd=to.getTime()+86399999;
  exp.forEach(e=>{ if(e.d.getTime()>=from.getTime()&&e.d.getTime()<=tEnd){ out[e.cat]=(out[e.cat]||0)+e.total; tot+=e.total; } });
  return {cats:out,total:tot};
}

async function renderHome(){
  show('Building overview…');
  const idx=await loadDateIndex();
  const today=new Date(); today.setHours(0,0,0,0);
  const yesterday=addDays(today,-1);
  // Fix (Gu, 2026-07-06): these used to run to the END of the month/week, showing days that
  // haven't happened yet as if they were zeros. Now everything is cumulative THROUGH YESTERDAY,
  // and the "previous period" comparison uses the SAME number of elapsed days (not the whole
  // previous month/week), so the trend %s compare like-for-like.
  const mStart=new Date(today.getFullYear(),today.getMonth(),1), mEndFull=new Date(today.getFullYear(),today.getMonth()+1,0);
  const mEnd = yesterday<mStart ? addDays(mStart,-1) : (yesterday<mEndFull?yesterday:mEndFull);
  const mDays = Math.max(0, Math.round((mEnd-mStart)/86400000)+1);
  const pStart=new Date(today.getFullYear(),today.getMonth()-1,1), pEndFull=new Date(today.getFullYear(),today.getMonth(),0);
  const pEnd = mDays<=0 ? addDays(pStart,-1) : addDays(pStart, Math.min(mDays, Math.round((pEndFull-pStart)/86400000)+1)-1);
  const wStart=monday(today), wEndFull=addDays(wStart,6);
  const wEnd = yesterday<wStart ? addDays(wStart,-1) : (yesterday<wEndFull?yesterday:wEndFull);
  const wDays = Math.max(0, Math.round((wEnd-wStart)/86400000)+1);
  const pwStart=addDays(wStart,-7);
  const pwEnd = wDays<=0 ? addDays(pwStart,-1) : addDays(pwStart, wDays-1);

  async function agg(from,to){ const rr=rowsForRange(idx,from,to); if(!rr) return null; return aggregate(await loadBlock(rr.r1,rr.r2)); }
  show('Reading month data…');   const mA=await agg(mStart,mEnd);
  show('Reading previous month…');const pA=await agg(pStart,pEnd);
  show('Reading week data…');    const wA=await agg(wStart,wEnd);
  const pwA=await agg(pwStart,pwEnd);
  const exp=await loadExpenditure();
  const mE=expByCat(exp,mStart,mEnd), pE=expByCat(exp,pStart,pEnd), wE=expByCat(exp,wStart,wEnd), pwE=expByCat(exp,pwStart,pwEnd);
  hide();
  // Pending-payments list moved to the Income page (it needs a per-cell colour scan, which is the
  // slowest part of the old Home page — Home now only does the 4 aggregate reads above).

  const monthName=today.toLocaleString('en-GB',{month:'long',year:'numeric'});
  function kpi(l,v,t){ return `<div class="kpi"><div class="l">${l}</div><div class="v">${v}</div>${t||''}</div>`; }
  function pcTable(a,pa){
    if(!a) return '<p class="muted">No data yet.</p>';
    const rows=Object.values(a.byClient).filter(x=>x.plan||x.sold).sort((x,y)=>y.sales-x.sales);
    return `<div style="overflow-x:auto"><table><tr><th>Client</th><th class="num">Deliv.</th><th class="num">Sold</th><th class="num">Ret %</th><th class="num">Sales TZS</th><th class="num">% of sales</th></tr>
    ${rows.map(x=>`<tr><td>${esc(x.name||x.client)}</td><td class="num">${fmt(x.plan)}</td><td class="num">${fmt(x.sold)}</td><td class="num">${pct(x.ret,x.plan).toFixed(0)}%</td><td class="num">${fmt(x.sales)}</td><td class="num">${pct(x.sales,a.sales).toFixed(1)}%</td></tr>`).join('')}</table></div>`;
  }
  function expTable(e,pe){
    const cats=Object.entries(e.cats).sort((a,b)=>b[1]-a[1]);
    if(!cats.length) return '<p class="muted">No expenditure recorded.</p>';
    return `<table><tr><th>Category</th><th class="num">TZS</th><th class="num">%</th><th class="num">Trend</th></tr>
    ${cats.map(([c,v])=>`<tr><td>${esc(c)}</td><td class="num">${fmt(v)}</td><td class="num">${pct(v,e.total).toFixed(0)}%</td><td class="num">${trendHtml(v,pe.cats[c],true)}</td></tr>`).join('')}
    <tr class="tot"><td>Total</td><td class="num">${fmt(e.total)}</td><td class="num">100%</td><td class="num">${trendHtml(e.total,pe.total,true)}</td></tr></table>`;
  }
  M.innerHTML=`
  <div class="card"><h2>Month — ${monthName}</h2><p class="muted" style="margin:-4px 0 8px">Through ${mDays>0?ymd(mEnd):'— no days elapsed yet'} · vs. same ${mDays} day(s) of previous month</p><div class="kpis">
    ${kpi('Projected deliveries',fmt(mA?.plan),trendHtml(mA?.plan,pA?.plan))}

    ${kpi('Sold units',fmt(mA?.sold),trendHtml(mA?.sold,pA?.sold))}
    ${kpi('Sales',fmtT(mA?.sales),trendHtml(mA?.sales,pA?.sales))}
    ${kpi('Expenditure',fmtT(mE.total),trendHtml(mE.total,pE.total,true))}
  </div></div>

  <div class="card"><h2>Month — expenditure by category</h2>${expTable(mE,pE)}</div>

// Fix (Gu, 2026-07-06): the old itemized "about to save" table was cumbersome and hard to read —
// removed. A plain one-line count next to Save is enough to know something is pending.
function markDirty(row,col,el){
  el.classList.add('dirty');
  dDirty[col+row]=el.value===''?null:Number(el.value);
  document.getElementById('saveBtn').disabled=false;
  const n=Object.keys(dDirty).length;
  document.getElementById('saveMsg').textContent=n+' cell'+(n===1?'':'s')+' changed — not yet saved';
}
// Fix (Gu, 2026-07-06): totals didn't update as you typed — there was no client-side formula at
// all before. This mirrors the Master's own Sold=Delivered-Returned, Total=Sold*Price purely for
// on-screen feedback; the real formula in Excel is untouched and remains authoritative.
function liveCalc(row,price,fixedRet){
  const g=document.getElementById('g'+row);
  const deliv=Number(g?.value)||0;
  const h=document.getElementById('h'+row);
  const ret = fixedRet!=null ? fixedRet : (Number(h?.value)||0);
  const sold=deliv-ret, total=sold*price;
  const soldEl=document.getElementById('sold'+row), totEl=document.getElementById('tot'+row);
  if(soldEl) soldEl.textContent=fmt(sold);
  if(totEl) totEl.textContent=fmt(total);
}
// Fix (Gu, 2026-07-06): Enter used to do nothing — there was no keyboard handler at all. Moves to
// the next row down in the SAME column (Deliv stays in Deliv, Returns stays in Returns), expanding
// the next day's section automatically if it was collapsed.
function cellKeydown(e){
  if(e.key!=='Enter') return;
  e.preventDefault();
  const cls = e.target.classList.contains('colG') ? 'colG' : 'colH';
  const list=[...document.querySelectorAll('input.'+cls)];
  const idx=list.indexOf(e.target);
  if(idx>=0 && idx<list.length-1){
    const next=list[idx+1];
    const dayDiv=next.closest('[id^="day"]'); if(dayDiv) dayDiv.style.display='';
    next.focus(); if(next.select) next.select();
  } else { e.target.blur(); }
}
async function saveDeliv(){
  if(!can('write')) return;
  const entries=Object.entries(dDirty);
  if(!entries.length) return;
  show(`Saving ${entries.length} cell(s) to the Master…`);
  const reqs=entries.map(([addr,val],i)=>({id:'w'+i,method:'PATCH',
    url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026')/range(address='${addr}')`,
    body:{values:[[val]]}}));
  const res=await gbatch(reqs);
  const fails=Object.entries(res).filter(([id,r])=>r.status>=400);
  hide();
  if(fails.length){
    // Fix (Gu, 2026-07-06): this used to say only "N cell(s) failed" with no detail. Now it shows
    // the actual Graph error per cell (e.g. file locked/423, conflict/409) so the real cause is
    // visible instead of guessing. Since Excel will now stay closed during app use, this specific
    // "file locked" cause should no longer come up — but any other failure will now say what it is.
    const detail=fails.map(([id,r])=>{
      const i=Number(id.slice(1)); const addr=entries[i][0];
      return addr+': HTTP '+r.status+(r.body&&r.body.error&&r.body.error.message?(' — '+r.body.error.message):'');
    }).join('\n');
    alert(fails.length+' cell(s) failed to save:\n\n'+detail+'\n\nIf the Master is open in desktop Excel, close it and try again.');
  } else {
    // Fix (Gu, 2026-07-06): this used to re-fetch the ENTIRE week from Graph after every save just
    // to redraw the screen — that full re-read was the slow part, not the save itself. Sold/Total
    // are already showing the correct live-calculated values (see liveCalc), so just clear the
    // dirty markers in place instead of reloading. Press Sync any time to pull the Master's own
    // authoritative formula results.
    entries.forEach(([addr])=>{ const el=document.querySelector(`input[data-addr="${addr}"]`); if(el) el.classList.remove('dirty'); });
    dDirty={};
    document.getElementById('saveBtn').disabled=true;
    document.getElementById('saveMsg').textContent='✓ Saved by '+currentUser.name+' at '+new Date().toLocaleTimeString();
  }
}

/* Week-label parser (Gu confirmed format e.g. "29 Jun - 5 Jul"). The sheet actually mixes two
   shapes — "D-D Mon [Year]" (e.g. "22-28 Jun 2026") and "D Mon - D Mon [Year]" (e.g. "29 Jun - 5
   Jul") — both handled here. Year defaults to 2026 (this workbook's year) when not written; if the
   end month is earlier than the start month it's a year boundary (Dec -> Jan), so the end year
   bumps by one. */
const MONTHS3={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseWeekLabel(label,defYear){
  const s=String(label||'').trim();
  let m=s.match(/^(\d{1,2})-(\d{1,2})\s+([A-Za-z]{3})[a-z]*\s*(\d{4})?$/);
  if(m){ const mo=MONTHS3[m[3].toLowerCase()]; if(mo==null) return null;
    const yr=m[4]?Number(m[4]):defYear;
    return {start:new Date(yr,mo,Number(m[1])), end:new Date(yr,mo,Number(m[2]))}; }
  m=s.match(/^(\d{1,2})\s+([A-Za-z]{3})[a-z]*\s*-\s*(\d{1,2})\s+([A-Za-z]{3})[a-z]*\s*(\d{4})?$/);
  if(m){ const mo1=MONTHS3[m[2].toLowerCase()], mo2=MONTHS3[m[4].toLowerCase()]; if(mo1==null||mo2==null) return null;
    const yr1=m[5]?Number(m[5]):defYear, yr2=mo2<mo1?yr1+1:yr1;
    return {start:new Date(yr1,mo1,Number(m[1])), end:new Date(yr2,mo2,Number(m[3]))}; }
  return null;
}
/* Fix (Gu, 2026-07-06): "invoice number" on this page was actually just echoing the branch code
   for Shoppers and always blank for Village/Butcher — the [Invoices & Income] sheet itself has no
   real invoice numbers in it. The real numbers live in the Shoppers/Village/Butcher Receipts
   sheets (Invoice_Number column), matched here by week + branch. */
function sheetForCol(name){
  if(name==='BUTCHER') return {sheet:'Butcher Receipts', branch:'Butcher'};
  if(name==='VILLAGE') return {sheet:'Village Receipts', branch:'Village'};
  return {sheet:'Shoppers Receipts', branch:String(name).trim().split(/\s+/).pop()};
}

    const wsIdx=col('Week_Start_Date'), invIdx=col('Invoice_Number'), branchIdx=col('Client_Branch')>=0?col('Client_Branch'):col('Client_Name');

      map[sheet+'|'+ymd(d)+'|'+(row[branchIdx]||'')]=row[invIdx]||'';
    }

  cache.recInv=map; return map;

async function loadInvoiceSummaries(){
  // QC fix: the first version of this only confirmed "a row exists this week" and punted the

  // version reads every branch row for the current week and totals Delivered/Returned/Sold/Sales
  // per product across Day1-7, the same Sold = Delivered - Returned logic generate_receipts.py uses.
  const PRODUCTS=['BigLoaves','Baguette','SmallLoaves','Focaccia'];

            const dIdx=col(`Day${day}_${p}`), rIdx=col(`Day${day}_Return_${p}`);

            if(rIdx>=0) returned+=Number(row[rIdx])||0;
          }
          const sold=delivered-returned, price=Number(row[priceIdx])||0;
          return {product:p, delivered, returned, sold, sales:sold*price};
        }).filter(Boolean);
        rows.push({branch:row[branchIdx]||'', products:perProduct});

    box.innerHTML = sections.map(s=>{
      if(!s.rows.length) return `<h3 class="wk">${esc(s.sheet)}</h3><p class="muted">No row for this week yet.</p>`;

        ${r.products.map(p=>`<tr><td>${p.product}</td><td class="num">${fmt(p.delivered)}</td><td class="num">${fmt(p.returned)}</td><td class="num">${fmt(p.sold)}</td><td class="num">${fmt(p.sales)}</td></tr>`).join('')}

      }).join('');

}
/* Fix (Gu, 2026-07-06): the old version only listed the TOP-LEVEL children of each receipts folder.
   Shoppers actually stores its PDFs nested inside "Invoices N-M" sub-folders, so that top-level
   listing returned zero PDFs for Shoppers ("no PDF exists") — it was only ever seeing sub-folders.
   Village/Butcher store PDFs directly at the top level, so they "worked" but with no filtering at
   all, showing up to 15 most-recent files regardless of branch/date ("entire year"). Fixed by:
   1) a recursive folder search (finds PDFs at any depth, fixing Shoppers), 2) grouping by branch
   code extracted from the filename and showing only the single latest file per branch/client
   (fixing "entire year" for all three), 3) caching the resolved folder ID persistently (like the
   Master file/timetables folder already do) so this doesn't re-search by name on every visit. */
const RECEIPT_FOLDERS={Shoppers:'Shoppers_Receipts_2026',Village:'Village_Receipts_2026',Butcher:'Butcher_Receipts_2026'};
const SHOPPERS_CODES=['SMA','SMB','SMI','STE','SML'];
function codeFromFilename(name,key){
  const base=name.replace(/\.pdf$/i,'');
  if(key==='Shoppers'){ const m=base.match(/(SMA|SMB|SMI|STE|SML)$/i); return m?m[1].toUpperCase():null; }
  return key.toUpperCase(); // Village/Butcher: one client each, code = the key itself
}
async function resolveReceiptFolder(key){
  if(S.pdfFolders[key]) return S.pdfFolders[key];
  const name=RECEIPT_FOLDERS[key];
  const r=await g(`/me/drive/root/search(q='${encodeURIComponent(name)}')?$select=id,name,folder&$top=10`);
  const hit=(r.value||[]).find(x=>x.folder && x.name===name);
  if(!hit) return null;
  S.pdfFolders[key]=hit.id; LSset('pdfFolders',JSON.stringify(S.pdfFolders));
  return hit.id;
}
async function loadReceiptPdfs(){
  const box=document.getElementById('invPdfList');
  if(cache.pdfLatest){ box.innerHTML=cache.pdfLatest; return; } // session cache; cleared by Sync
  try{
    show('Finding the latest receipts…');
    let html='';
    for(const key of Object.keys(RECEIPT_FOLDERS)){
      let folderId=await resolveReceiptFolder(key);
      let files=[];
      const fetchPdfs=async(id)=>{
        const r=await g(`/me/drive/items/${id}/search(q='.pdf')?$select=name,webUrl,lastModifiedDateTime,file&$top=200`);
        return (r.value||[]).filter(x=>x.file && x.name.toLowerCase().endsWith('.pdf'));
      };
      if(folderId){
        try{ files=await fetchPdfs(folderId); }
        catch(e){ // cached folder ID may be stale (moved/renamed) — clear and retry once
          delete S.pdfFolders[key]; LSset('pdfFolders',JSON.stringify(S.pdfFolders));
          folderId=await resolveReceiptFolder(key);
          if(folderId) files=await fetchPdfs(folderId);
        }
      }
      html+=`<h3 class="wk">${key}</h3>`;
      if(!folderId){ html+=`<p class="muted">${RECEIPT_FOLDERS[key]} folder not found.</p>`; continue; }
      if(!files.length){ html+='<p class="muted">No PDFs found in this folder.</p>'; continue; }
      const codes = key==='Shoppers' ? SHOPPERS_CODES : [key.toUpperCase()];
      let any=false;
      for(const code of codes){
        const matches=files.filter(f=>codeFromFilename(f.name,key)===code);
        if(!matches.length) continue;
        any=true;
        matches.sort((a,b)=>(b.lastModifiedDateTime||'').localeCompare(a.lastModifiedDateTime||''));
        const latest=matches[0];
        html+=`<a class="filelink" href="${latest.webUrl}" target="_blank">📄 ${esc(latest.name)} <span class="muted">(${code})</span><small>Modified ${latest.lastModifiedDateTime?.slice(0,10)||''}</small></a>`;
      }
      if(!any) html+='<p class="muted">No matching receipts found.</p>';
    }
    hide(); box.innerHTML=html; cache.pdfLatest=html;
  }catch(e){ hide(); box.innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

  for(let i=1;i<V.length;i++){
    const row=V[i]; const d=excelDate(row[0]);
    if(!d || d<mStart || d>mEnd) continue;
    const rowNum=i+1;
    if(row[1]){ filled.push({rowNum,row,d}); } else { blanks.push({rowNum,row,d}); }
  }
  expRowMeta = blanks.length? blanks[0] : null;
  const writeAllowed=can('write');
  M.innerHTML=`<div class="card"><h2>Expenses — ${monthName}</h2>
  <p class="muted">Shows only the current month, like the Excel sheet. Once an entry is saved it becomes read-only here — correct mistakes in Excel.</p>
  ${filled.length?`<div style="overflow-x:auto"><table><tr><th>Date</th><th>Type</th><th>Provider</th><th>Detail</th><th class="num">Price</th><th class="num">VAT</th><th class="num">Total</th><th>Receipt</th><th>TIN/VRN</th><th>How</th></tr>
  ${filled.map(f=>`<tr><td>${ymd(f.d)}</td><td>${esc(f.row[1]||'')}</td><td>${esc(f.row[2]||'')}</td><td>${esc(f.row[3]||'')}</td><td class="num">${fmt(f.row[4])}</td><td class="num">${fmt(f.row[5])}</td><td class="num">${fmt(f.row[6])}</td><td>${esc(f.row[7]||'')}</td><td>${esc(f.row[8]||'')}</td><td>${esc(f.row[9]||'')}</td></tr>`).join('')}
  <tr class="tot"><td colspan="6">Total this month</td><td class="num">${fmt(filled.reduce((s,f)=>s+(Number(f.row[6])||0),0))}</td><td colspan="2"></td></tr>
  </table></div>`:'<p class="muted">No expenses recorded yet this month.</p>'}
  </div>
  <div class="card"><h2>Add new expense</h2>
  ${!writeAllowed?'<p class="muted">Your role (Viewer) can’t add expenses.</p>': !expRowMeta ? `<p class="err">No blank pre-formatted row is ready for ${monthName} in the Master's [2026 Expenditure] sheet yet. In Excel, copy the last row's formula down a few more rows, save, then come back and Sync.</p>` : `
  ${ymd(expRowMeta.d)!==ymd(today)?`<p class="muted">Note: the next ready row in the Master was originally pre-dated ${ymd(expRowMeta.d)} (the template hasn't been extended past there yet) — the date below defaults to today instead; change it if this expense is actually for a different day.</p>`:''}
  <label>Date</label><input id="exDate" type="date" value="${ymd(today)}">
  <label>Type of expenditure</label><select id="exType">${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
  <label>Provider</label><input id="exProvider" placeholder="e.g. Theresia Joseph">
  <label>Product / detail</label><input id="exDetail" placeholder="e.g. Flour 50kg">
  <div class="row"><div style="flex:1"><label>Price before TAX</label><input id="exPrice" type="number" min="0"></div><div style="flex:1"><label>VAT Tax (leave blank if none)</label><input id="exVat" type="number" min="0" placeholder="blank = none"></div></div>
  <label>Receipt n.</label><input id="exReceipt" placeholder="e.g. Hand Receipt">
  <label>TIN/VRN</label><input id="exTin" placeholder="e.g. No">
  <label>How (payment method)</label><input id="exHow" placeholder="e.g. TigoPesa, Cash, Bank Transfer">
  <div class="row" style="margin-top:10px"><button class="btn" onclick="saveExpense(${expRowMeta.rowNum})">Save (row ${expRowMeta.rowNum} in Master)</button></div>
  `}
  </div>`;
}
async function saveExpense(rowNum){
  const dateStr=document.getElementById('exDate').value;
  const type=document.getElementById('exType').value;
  const provider=document.getElementById('exProvider').value.trim();
  const detail=document.getElementById('exDetail').value.trim();
  const price=Number(document.getElementById('exPrice').value)||0;
  const vatRaw=document.getElementById('exVat').value.trim();
  const receipt=document.getElementById('exReceipt').value.trim();
  const tin=document.getElementById('exTin').value.trim();
  const how=document.getElementById('exHow').value.trim();
  if(!provider||!price){ alert('Provider and Price are required.'); return; }
  const vatMsg = vatRaw===''?'no VAT':fmtT(Number(vatRaw));
  if(!confirm(`Save this expense to row ${rowNum} of the Master?\n\n${type} — ${provider} — ${detail}\nPrice ${fmtT(price)}, ${vatMsg}`)) return;
  show('Saving expense…');
  // QC fix: building this from new Date(dateStr+'T00:00:00') and dividing by 86400000 only gave the
  // right day by coincidence in Dar es Salaam's UTC+3 (rounding masked the offset); it would have
  // silently saved the WRONG DATE in a negative-UTC-offset timezone. Parse the Y/M/D directly and use
  // Date.UTC so the serial matches excelDate()'s own UTC-midnight assumption regardless of device timezone.
  const [exY,exM,exD]=dateStr.split('-').map(Number);
  const excelSerial=Math.round(Date.UTC(exY,exM-1,exD)/86400000)+25569;
  const reqs=[
    {id:'a',method:'PATCH',url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026 Expenditure')/range(address='A${rowNum}')`,body:{values:[[excelSerial]]}},
    {id:'b',method:'PATCH',url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026 Expenditure')/range(address='B${rowNum}:D${rowNum}')`,body:{values:[[type,provider,detail]]}},
    {id:'c',method:'PATCH',url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026 Expenditure')/range(address='E${rowNum}')`,body:{values:[[price]]}},
    {id:'e',method:'PATCH',url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026 Expenditure')/range(address='H${rowNum}:J${rowNum}')`,body:{values:[[receipt,tin,how]]}}
  ];
  if(vatRaw!=='') reqs.push({id:'d',method:'PATCH',url:`/me/drive/items/${S.fileId}/workbook/worksheets('2026 Expenditure')/range(address='F${rowNum}')`,body:{values:[[Number(vatRaw)]]}});
  const res=await gbatch(reqs);
  const fails=Object.values(res).filter(r=>r.status>=400);
  hide();
  if(fails.length){ alert(fails.length+' field(s) failed to save. Check the file is not locked and retry.'); }
  else { cache.exp=null; await renderExpenses(); }
}

/* ---------- SCHEDULE (was "Staff"; item 9: renamed + only current month's timetable shown) ---------- */
async function renderStaff(){
  show('Loading this month’s timetable…');
  let files=[];
  if(S.tfolderId){
    const r=await g(`/me/drive/items/${S.tfolderId}/children?$select=name,webUrl,lastModifiedDateTime&$orderby=name`);
    files=r.value||[];
  }
  hide();
  // Fix (Gu, 2026-07-06): used to fall back to showing EVERY file in the folder whenever the
  // month-name match failed, which let unrelated files leak through. Now only Massimo_timetable_*
  // files are ever considered, and if this month's isn't found, it says so instead of dumping
  // the whole folder.
  const massimoFiles=files.filter(f=>f.name.toLowerCase().startsWith('massimo_timetable'));
  const monthName=new Date().toLocaleString('en-GB',{month:'long'}), year=new Date().getFullYear();
  const wanted=(monthName+String(year)).toLowerCase();
  const thisMonth=massimoFiles.filter(f=>f.name.toLowerCase().replace(/[^a-z0-9]/g,'').includes(wanted.replace(/[^a-z0-9]/g,'')));
  M.innerHTML=`<div class="card"><h2>Schedule</h2>
  ${!S.tfolderId?'<p class="muted">Timetables folder not linked yet — go to Settings → Find timetables folder.</p>':
  thisMonth.length? thisMonth.map(f=>`<a class="filelink" href="${f.webUrl}" target="_blank">📄 ${esc(f.name)}<small>Modified ${f.lastModifiedDateTime?.slice(0,10)||''}</small></a>`).join('')
  :`<p class="muted">No Massimo_timetable file found for ${esc(monthName)} ${year}.</p>`}
  <p class="muted" style="margin-top:10px">Files open read-only in Excel/Word online in a new tab.</p></div>`;
}

/* ---------- SETTINGS ---------- */
function renderSettings(){
  hide();
  // Fixed after Gu got locked out: only restrict these controls when someone has actively picked a
  // Viewer identity at the PIN screen. If no PIN identity is active at all (currentUser null — e.g.
  // this device hasn't set up the PIN system, or hasn't switched to it since an update), Settings
  // behaves exactly as it always did: fully open. This avoids ever requiring the PIN system just to
  // reach basic Setup, while still restricting an actual logged-in Viewer.
  const settingsWriteAllowed = !currentUser || can('write');
  M.innerHTML=`<div class="card"><h2>Setup</h2>
  ${!settingsWriteAllowed?'<p class="muted">Your role (Viewer) can see Setup but not change it.</p>':''}
  <label>1. Azure App Client ID (from SETUP_GUIDE.md, step 1)</label>
  <input id="cid" value="${esc(S.clientId||'')}" placeholder="e.g. 1a2b3c4d-...." ${settingsWriteAllowed?'':'disabled'}>
  <div class="row" style="margin-top:8px"><button class="btn sm" ${settingsWriteAllowed?'':'disabled'} onclick="S.clientId=document.getElementById('cid').value.trim();LSset('clientId',S.clientId);location.reload()">Save Client ID</button></div>
  <label>2. Master Excel file ${S.fileId?'<span class="pill paid">linked</span>':'<span class="pill pend">not linked</span>'}</label>
  <button class="btn sm sec" ${settingsWriteAllowed?'':'disabled'} onclick="findFile()">Find Salty_Water_2026_Master.xlsx</button>
  <label>3. Timetables folder ${S.tfolderId?'<span class="pill paid">linked</span>':'<span class="pill pend">not linked</span>'}</label>
  <button class="btn sm sec" ${settingsWriteAllowed?'':'disabled'} onclick="findFolder()">Find "Schedules and Timetables" folder</button>
  <div id="setout" style="margin-top:10px"></div>
  <label>Account</label>
  <p class="muted">${account?('Signed in as '+esc(account.username)+' — '):'Not signed in. '}</p>
  <div class="row">${account?`<button class="btn sm sec" ${settingsWriteAllowed?'':'disabled'} onclick="msalApp.logoutRedirect()">Sign out</button>`:(S.clientId?'<button class="btn sm" onclick="login()">Sign in</button>':'')}</div>
  </div>
  ${currentUser && can('manageUsers') ? renderUserAdmin() : ''}
  <div class="card"><h2>Safety</h2><p class="muted">This app can only: edit columns G and H of the [2026] sheet, add data to blank pre-formatted rows on the [2026 Expenditure] sheet, and read (never write) everything else. It never deletes rows, never edits formulas, never touches other sheets. It no longer writes cell colours — Income is read-only.</p></div>`;
}
/* ---------- USER ADMIN (item 1, Admin-only) ---------- */
function renderUserAdmin(){
  const users=getUsers();
  return `<div class="card"><h2>Users on this device</h2>
  <p class="muted">Name + PIN + role, stored only on this device/browser. Set the same list up on every staff device during install so names/PINs match everywhere. This is for accountability, not Microsoft-level security — everyone still shares the one OneDrive connection above.</p>
  ${users.map((u,i)=>`<div class="row" style="margin-bottom:6px"><div style="flex:1">${esc(u.name)} <span class="muted">(${ROLES[u.role]?.label||u.role}, PIN ${esc(u.pin)})</span></div><button class="btn sm sec" onclick="removeUser(${i})">Remove</button></div>`).join('')||'<p class="muted">No users yet.</p>'}
  <label style="margin-top:12px">Add user</label>
  <div class="row"><input id="nuName" placeholder="Name" style="flex:2"><input id="nuPin" placeholder="4-digit PIN" maxlength="4" inputmode="numeric" style="flex:1">
  <select id="nuRole" style="flex:1"><option value="editor">Editor</option><option value="viewer">Viewer</option><option value="admin">Admin</option></select>
  <button class="btn sm" onclick="addUser()">Add</button></div>
  </div>`;
}
function addUser(){
  const name=document.getElementById('nuName').value.trim(), pin=document.getElementById('nuPin').value.trim(), role=document.getElementById('nuRole').value;
  if(!name||pin.length<4){ alert('Enter a name and a 4-digit PIN.'); return; }
  const users=getUsers(); users.push({name,pin,role}); setUsers(users); renderSettings();
}
function removeUser(i){
  const users=getUsers(); const u=users[i];
  if(!confirm('Remove '+u.name+'?')) return;
  users.splice(i,1); setUsers(users); renderSettings();
}
async function findFile(){
  const o=document.getElementById('setout'); o.innerHTML='Searching…';
  const r=await g(`/me/drive/root/search(q='Salty_Water_2026_Master')?$select=id,name,parentReference,webUrl&$top=10`);
  const hits=(r.value||[]).filter(x=>x.name.toLowerCase().endsWith('.xlsx'));
  if(!hits.length){ o.innerHTML='<div class="err">Not found in this OneDrive. Is this the right Microsoft account?</div>'; return; }
  o.innerHTML=hits.map((h,i)=>`<div class="row" style="margin-bottom:6px"><div style="flex:1;font-size:13px">${esc(h.name)}<br><small class="muted">${esc(h.parentReference?.path?.replace('/drive/root:','')||'')}</small></div>
  <button class="btn sm" onclick='S.fileId=${JSON.stringify(h.id)};LSset("fileId",S.fileId);renderSettings()'>Use this</button></div>`).join('');
}
async function findFolder(){
  const o=document.getElementById('setout'); o.innerHTML='Searching…';
  const r=await g(`/me/drive/root/search(q='Schedules and Timetables')?$select=id,name,folder,parentReference&$top=10`);
  const hits=(r.value||[]).filter(x=>x.folder);
  if(!hits.length){ o.innerHTML='<div class="err">Folder not found.</div>'; return; }
  o.innerHTML=hits.map(h=>`<div class="row" style="margin-bottom:6px"><div style="flex:1;font-size:13px">📁 ${esc(h.name)}<br><small class="muted">${esc(h.parentReference?.path?.replace('/drive/root:','')||'')}</small></div>
  <button class="btn sm" onclick='S.tfolderId=${JSON.stringify(h.id)};LSset("tfolderId",S.tfolderId);renderSettings()'>Use this</button></div>`).join('');
}

/* ---------- SYNC & BOOT ---------- */
async function fullSync(){ cache={dateIndex:null,exp:null,invRows:null,invFills:{},monthBlocks:{},pdfLatest:null,recInv:null}; await render(); }
(async function boot(){
  // PWA manifest for "install to home screen" (item 3b: Android uses manifest icons; iOS Safari
  // ignores the manifest for the home-screen icon and needs its own apple-touch-icon link tag).
  document.getElementById('logoimg').src=LOGO;
  const man={name:'Massimo Italian Bread — Admin',short_name:'Massimo',start_url:location.href,display:'standalone',background_color:'#FFFDFD',theme_color:'#A71B1B',
    icons:[{src:LOGO,sizes:'280x212',type:'image/png',purpose:'any'}]};
  document.getElementById('manifest').href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(man));
  const appleIcon=document.createElement('link'); appleIcon.rel='apple-touch-icon'; appleIcon.href=LOGO; document.head.appendChild(appleIcon);
  const appleTitle=document.createElement('meta'); appleTitle.name='apple-mobile-web-app-title'; appleTitle.content='Massimo'; document.head.appendChild(appleTitle);
  const appleCap=document.createElement('meta'); appleCap.name='apple-mobile-web-app-capable'; appleCap.content='yes'; document.head.appendChild(appleCap);
  document.getElementById('nav').style.display='flex';
  try{ currentUser = JSON.parse(sessionStorage.getItem('mib_curuser')||'null'); }catch(e){ currentUser=null; }
  if(!initMsal()){ go('set'); return; }
  try{
    const resp=await msalApp.handleRedirectPromise();
    account = resp?.account || msalApp.getAllAccounts()[0] || null;
    if(account){ msalApp.setActiveAccount(account); document.getElementById('subtitle').textContent=account.username; document.getElementById('syncBtn').style.display=''; }
  }catch(e){ M.innerHTML=`<div class="err">Sign-in error: ${esc(e.message)}</div>`; }
  go((!S.fileId||!account)?'set':'home');
})();
</script>
