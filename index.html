<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#A71B1B">
<title>Massimo Admin</title>
<link rel="manifest" id="manifest">
<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js" integrity="sha384-PARf28kmic36Ve+O3DnUerRXFtOQ7ZDqRDGpLcbljly5/N39T2OV3kt3QsWOKeAX" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--brown:#A71B1B;--brand:#A71B1B;--brand-dk:#7d1414;--cream:#FFFDFD;--bg:#FAF5F0;--card:#fff;--ink:#141313;--muted:#8b7f78;--green:#2e7d32;--greenbg:#e6f4e6;--orange:#e65100;--orangebg:#fff3e0;--red:#A71B1B;--line:#eee2da}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Lora',Georgia,serif}
body{background:var(--bg);color:var(--ink);padding-bottom:86px}
header{background:linear-gradient(135deg,#141313 0%,#2a1414 60%,#3d1010 100%);color:#FFFDFD;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--brand);box-shadow:0 2px 12px rgba(20,19,19,.25)}
header .hbrand{display:flex;align-items:center;gap:12px}
header img.logo{height:44px;width:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
header h1{font-size:19px;font-weight:400;font-family:'Yeseva One',serif;letter-spacing:.3px}
header .sub{font-size:11px;opacity:.75;font-style:italic}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(20,19,19,.06)}
.card h2{font-size:16px;color:var(--brand);margin-bottom:10px;font-family:'Yeseva One',serif;font-weight:400;letter-spacing:.3px;border-bottom:2px solid var(--line);padding-bottom:6px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.kpi{background:linear-gradient(180deg,#FFF9F5,#FBF1EA);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi .v{font-size:20px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.kpi .t{font-size:11px;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{color:var(--muted);text-align:left;font-weight:600;padding:5px 6px;border-bottom:1px solid var(--line);font-size:11px}
td{padding:5px 6px;border-bottom:1px solid var(--line)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
nav{position:fixed;bottom:10px;left:10px;right:10px;background:rgba(20,19,19,.92);backdrop-filter:blur(8px);border-radius:20px;display:flex;z-index:20;padding:6px;box-shadow:0 6px 24px rgba(20,19,19,.35)}
nav button{flex:1;background:none;border:none;padding:7px 2px 8px;font-size:10px;color:#cbbdb6;cursor:pointer;border-radius:14px;transition:all .2s;font-family:'Lora',serif}
nav button .ic{display:block;margin:0 auto 3px;width:22px;height:22px}
nav button .ic svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:#fff;background:var(--brand);font-weight:700;box-shadow:0 2px 8px rgba(167,27,27,.45)}
.btn{background:var(--brand);color:#fff;border:none;border-radius:99px;padding:10px 18px;font-size:14px;cursor:pointer;font-family:'Lora',serif;font-weight:600;box-shadow:0 2px 6px rgba(167,27,27,.3);transition:background .2s}
.btn:hover{background:var(--brand-dk)}
.btn.sec{background:#fff;color:var(--brand);border:1.5px solid var(--brand);box-shadow:none}
.btn:disabled{opacity:.5}
.btn.sm{padding:6px 10px;font-size:12px}
input,select{border:1px solid var(--line);border-radius:8px;padding:9px;font-size:14px;width:100%;background:#fff}
input.cell{width:56px;padding:5px;text-align:right;font-size:13px}
input.cell.dirty{border-color:var(--orange);background:var(--orangebg)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.pill.paid{background:var(--greenbg);color:var(--green)}
.pill.pend{background:var(--orangebg);color:var(--orange)}
.pill.un{background:#eee;color:var(--muted)}
.day-head{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;background:linear-gradient(90deg,#FBF1EA,#FFF9F5);border-left:4px solid var(--brand);border-radius:10px;cursor:pointer;margin-top:8px;font-weight:700;font-size:14px}
.muted{color:var(--muted);font-size:12px}
.err{background:#fdecea;color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px;white-space:pre-wrap}
.ok{background:var(--greenbg);color:var(--green);padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px}
#loader{position:fixed;inset:0;background:rgba(250,245,240,.88);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50;font-size:14px;color:var(--brown)}
.spin{width:36px;height:36px;border:4px solid var(--line);border-top-color:var(--brown);border-radius:50%;animation:s 1s linear infinite;margin-bottom:10px}
@keyframes s{to{transform:rotate(360deg)}}
label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
.inv-cell{cursor:pointer;border-radius:6px;padding:4px 6px}
.inv-cell.paid{background:var(--greenbg)}
.inv-cell.pend{background:var(--orangebg)}
h3.wk{font-size:13px;margin:12px 0 4px;color:var(--brown)}
.filelink{display:block;padding:11px 8px;border-bottom:1px solid var(--line);color:var(--ink);text-decoration:none;font-size:14px}
.filelink small{color:var(--muted);display:block;font-size:11px}
.tot{font-weight:700;background:var(--cream)}
@media(min-width:700px){nav{max-width:560px;left:50%;right:auto;transform:translateX(-50%)}}
</style>
</head>
<body>
<header><div class="hbrand"><img class="logo" id="logoimg" alt="Massimo Italian Bread"><div><h1 id="title">Massimo Italian Bread</h1><div class="sub" id="subtitle">Salty Water administration</div></div></div><button class="btn sm sec" id="syncBtn" onclick="fullSync()" style="display:none;background:transparent;color:#FFFDFD;border-color:#FFFDFD">⟳ Sync</button></header>
<div id="loader"><div class="spin"></div><div id="loadmsg">Loading…</div></div>
<main id="main"></main>
<nav id="nav" style="display:none">
<button data-p="home" onclick="go('home')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg></span>Overview</button>
<button data-p="deliv" onclick="go('deliv')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M1 7h14v10H1z"/><path d="M15 10h4l3 3v4h-7"/><circle cx="5.5" cy="17.5" r="1.8"/><circle cx="18.5" cy="17.5" r="1.8"/></svg></span>Deliveries</button>
<button data-p="inv" onclick="go('inv')"><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 2h12v20l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg></span>Invoices</button>
<button data-p="staff" onclick="go('staff')"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c.7-3.6 3.4-5.5 6.5-5.5s5.8 1.9 6.5 5.5"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.7c2.7.2 4.9 1.9 5.5 5.3"/></svg></span>Staff</button>
<button data-p="set" onclick="go('set')"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h0a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h0a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v0a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg></span>Settings</button>
</nav>

/* ================= CONFIG & STATE ================= */
const LS = k => localStorage.getItem('mib_'+k);
const LSset = (k,v) => localStorage.setItem('mib_'+k, v);
let msalApp=null, account=null, token=null;
let S = { fileId: LS('fileId'), tfolderId: LS('tfolderId'), clientId: LS('clientId'), scanWeeks: parseInt(LS('scanWeeks')||'10') };
const PAID='#92D050', PEND='#FFC000';
let cache = { dateIndex:null, exp:null, invRows:null, invFills:{}, monthBlocks:{} };
const GRAPH='https://graph.microsoft.com/v1.0';
const fmt = n => (n==null||isNaN(n))?'—':Math.round(n).toLocaleString('en-US');
const fmtT = n => fmt(n)+' TZS';
const pct = (a,b) => b? (100*a/b) : 0;

/* ================= AUTH ================= */
function initMsal(){
  if(!S.clientId) return false;
  msalApp = new msal.PublicClientApplication({
    auth:{clientId:S.clientId, authority:'https://login.microsoftonline.com/common', redirectUri: location.origin+location.pathname},
    cache:{cacheLocation:'localStorage'}
  });
  return true;
}
async function login(){ await msalApp.loginRedirect({scopes:['Files.ReadWrite','User.Read']}); }
async function getToken(){
  const req={scopes:['Files.ReadWrite','User.Read'],account};
  try{ const r=await msalApp.acquireTokenSilent(req); return r.accessToken; }
  catch(e){ await msalApp.acquireTokenRedirect(req); }
}
async function g(path, opts={}){
  const t=await getToken();
  const r=await fetch(GRAPH+path,{...opts,headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){ const b=await r.text(); throw new Error('Graph '+r.status+' on '+path.slice(0,80)+': '+b.slice(0,200)); }
  return r.status===204?null:r.json();
}
async function gbatch(reqs){ // reqs: [{id,method,url,body?}] max 20 per call
  const t=await getToken(); const out={};
  for(let i=0;i<reqs.length;i+=20){
    const chunk=reqs.slice(i,i+20).map(r=>({id:r.id,method:r.method,url:r.url,body:r.body,headers:r.body?{'Content-Type':'application/json'}:undefined}));
    const r=await fetch(GRAPH+'/$batch',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({requests:chunk})});
    const j=await r.json();
    for(const resp of j.responses) out[resp.id]=resp;
  }
  return out;
}
const WB = () => `/me/drive/items/${S.fileId}/workbook`;
const wsRange = (sheet,addr) => `${WB()}/worksheets('${encodeURIComponent(sheet)}')/range(address='${addr}')`;

/* ================= HELPERS ================= */
function excelDate(v){ // Graph returns excel serials for dates
  if(typeof v==='number' && v>40000 && v<60000) return new Date(Math.round((v-25569)*86400*1000));
  return null;
}
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function monday(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function trendHtml(cur,prev,inverse){ // inverse: down is good (returns, expenses)
  if(prev==null||prev===0||cur==null) return '<span class="t flat">—</span>';
  const ch=100*(cur-prev)/Math.abs(prev); if(Math.abs(ch)<0.5) return '<span class="t flat">≈ same</span>';
  const up=ch>0, good=inverse?!up:up;
  return `<span class="t ${good?'up':'down'}">${up?'▲':'▼'} ${Math.abs(ch).toFixed(0)}% vs prev</span>`;
}
function show(msg){ document.getElementById('loader').style.display='flex'; document.getElementById('loadmsg').textContent=msg; }
function hide(){ document.getElementById('loader').style.display='none'; }
function esc(s){ return String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

/* ================= DATA LOADING ================= */
async function loadDateIndex(force){
  if(cache.dateIndex && !force) return cache.dateIndex;
  show('Reading 2026 sheet index…');
  const r=await g(wsRange('2026','A1:A26500')+'?$select=values');
  const idx=[]; // {row(1-based), date}
  r.values.forEach((v,i)=>{ const d=excelDate(v[0]); if(d) idx.push({row:i+1,d}); });
  cache.dateIndex=idx; return idx;
}
function rowsForRange(idx,from,to){ // inclusive dates -> {r1,r2} 1-based, contiguous assumption
  const f=from.getTime(), t=to.getTime()+86399999; // include whole end day
  const hit=idx.filter(x=>x.d.getTime()>=f && x.d.getTime()<=t);
  if(!hit.length) return null;
  return {r1:hit[0].row, r2:hit[hit.length-1].row};
}
async function loadBlock(r1,r2){
  const r=await g(wsRange('2026',`A${r1}:K${r2}`)+'?$select=values');
  return r.values.map((v,i)=>({row:r1+i,date:excelDate(v[0]),day:v[1],ctype:v[2],name:v[3],type:v[4],product:v[5],plan:v[6],ret:v[7],sold:v[8],price:v[9],total:v[10]}));
}
async function loadExpenditure(force){
  if(cache.exp && !force) return cache.exp;
  show('Reading expenditure…');
  const r=await g(wsRange('2026 Expenditure','A1:J1500')+'?$select=values');
  const out=[];
  r.values.slice(1).forEach(v=>{
    let d=excelDate(v[0]);
    if(!d && typeof v[0]==='string'){ const p=Date.parse(v[0]); if(!isNaN(p)) d=new Date(p); }
    if(d && v[6]!=null) out.push({d,cat:v[1]||'Other',total:Number(v[6])||0});
  });
  cache.exp=out; return out;
}
async function loadInvoiceRows(force){
  if(cache.invRows && !force) return cache.invRows;
  show('Reading invoices & income…');
  const r=await g(wsRange('Invoices & Income','A1:P130')+'?$select=values');
  const weeks=[]; // {label, headRow, totRow, cols:[{c(0-based col idx),name,amount}]}
  const V=r.values;
  for(let i=0;i<V.length;i++){
    const wk=V[i][1];
    if(typeof wk==='string' && /\d{4}|\bJan|\bFeb|\bMar|\bApr|\bMay|\bJun|\bJul|\bAug|\bSep|\bOct|\bNov|\bDec|-/.test(wk) && wk!=='WEEK' && V[i+1] && V[i+1][1]==='TOTAL TSH'){
      const cols=[];
      for(let c=2;c<=13;c++){ const name=V[0][c]; const amount=V[i+1][c]; if(name && name!=='TOTAL' && name!=='Returned') cols.push({c,name,inv:V[i][c],amount:Number(amount)||0}); }
      weeks.push({label:wk,headRow:i+1,totRow:i+2,cols,total:Number(V[i+1][12])||0});
    }
  }
  cache.invRows=weeks; return weeks;
}
function colLetter(c0){ return String.fromCharCode(65+c0); } // cols 0..13 -> A..N
async function loadInvoiceFills(weeks,force){
  const recent=weeks.slice(-S.scanWeeks);
  const reqs=[];
  recent.forEach(w=>w.cols.forEach(col=>{
    const key=`${w.totRow}_${col.c}`;
    if(force || !(key in cache.invFills))
      reqs.push({id:key,method:'GET',url:`/me/drive/items/${S.fileId}/workbook/worksheets('${encodeURIComponent('Invoices & Income')}')/range(address='${colLetter(col.c)}${w.totRow}')/format/fill`});
  }));
  if(reqs.length){ show(`Reading payment marks (${reqs.length} cells)…`);
    const res=await gbatch(reqs);
    for(const k in res){ cache.invFills[k]=(res[k].status===200)?(res[k].body.color||null):null; }
  }
  return cache.invFills;
}
function classifyFill(hex){
  if(!hex||hex==='#FFFFFF'||hex.toLowerCase()==='none') return 'un';
  const r=parseInt(hex.slice(1,3),16),g_=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(g_>140 && r<170 && b<170) return 'paid';
  if(r>200 && g_>90 && b<130) return 'pend';
  return 'un';
}

/* ================= AGGREGATIONS ================= */
function aggregate(rows){
  const a={plan:0,ret:0,sold:0,sales:0,byPC:{},byClient:{}};
  rows.forEach(x=>{
    const p=Number(x.plan)||0, rt=Number(x.ret)||0, sl=Number(x.sold)||0, tt=Number(x.total)||0;
    a.plan+=p; a.ret+=rt; a.sold+=sl; a.sales+=tt;
    const k=x.name+'|'+x.product;
    (a.byPC[k]=a.byPC[k]||{client:x.name,product:x.product,plan:0,ret:0,sold:0,sales:0});
    a.byPC[k].plan+=p; a.byPC[k].ret+=rt; a.byPC[k].sold+=sl; a.byPC[k].sales+=tt;
    (a.byClient[x.name]=a.byClient[x.name]||{plan:0,ret:0,sold:0,sales:0});
    const c=a.byClient[x.name]; c.plan+=p; c.ret+=rt; c.sold+=sl; c.sales+=tt;
  });
  return a;
}
function expByCat(exp,from,to){
  const out={}; let tot=0;
  const tEnd=to.getTime()+86399999;
  exp.forEach(e=>{ if(e.d.getTime()>=from.getTime()&&e.d.getTime()<=tEnd){ out[e.cat]=(out[e.cat]||0)+e.total; tot+=e.total; } });
  return {cats:out,total:tot};
}

  document.getElementById('logoimg').src=LOGO;
  const man={name:'Massimo Admin',short_name:'Massimo',start_url:location.href,display:'standalone',background_color:'#FAF5F0',theme_color:'#A71B1B',icons:[{src:LOGO,sizes:'280x212',type:'image/png'}]};
  document.getElementById('manifest').href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(man));
  document.getElementById('nav').style.display='flex';
  if(!initMsal()){ go('set'); return; }
  try{
    const resp=await msalApp.handleRedirectPromise();
    account = resp?.account || msalApp.getAllAccounts()[0] || null;
    if(account){ msalApp.setActiveAccount(account); document.getElementById('subtitle').textContent=account.username; document.getElementById('syncBtn').style.display=''; }
  }catch(e){ M.innerHTML=`<div class="err">Sign-in error: ${esc(e.message)}</div>`; }
  go((!S.fileId||!account)?'set':'home');
})();
</script>
</body>
</html>
